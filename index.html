<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Display Bapas Purwokerto</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #114b5f; --secondary: #f4d35e; }
        body { background: #030712; color: #fff; font-family: sans-serif; overflow: hidden; }
        #main-display { width: 100vw; height: 100vh; display: grid; grid-template-rows: 100px 1fr; grid-template-columns: 55% 45%; }
        .header { grid-column: 1 / span 2; background: var(--primary); display: flex; align-items: center; padding: 0 40px; justify-content: space-between; }
        .queue-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; }
        .card { background: #1e293b; padding: 20px; text-align: center; border-radius: 8px; }
        .val { font-size: 30px; font-weight: bold; color: var(--secondary); }
    </style>
</head>
<body>

<div id="main-display">
    <div class="header">
        <h1>BAPAS KELAS II PURWOKERTO</h1>
        <div id="clock">00:00:00</div>
    </div>
    
    <div class="left-panel">
        <div class="queue-bar">
            <div class="card"><div>Antrian A</div><div id="num-a" class="val">-</div></div>
            <div class="card"><div>Antrian B</div><div id="num-b" class="val">-</div></div>
            <div class="card"><div>Antrian C</div><div id="num-c" class="val">-</div></div>
        </div>
        <div id="video-container" style="padding:20px; height: 60vh;">
            <div id="yt-player"></div>
        </div>
    </div>

    <div class="right-panel" style="padding: 20px;">
        <div id="data-display" style="font-size: 20px;">Menunggu data dari Cloud...</div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwuFESEjOk1sY3uvhm6b9cbogilnt7vLHzlMUSYPQHHkbVGVg9D6PV300XF1MbWeUDHeA/exec";
    let lastAntrian = {A:"", B:"", C:""};

    function fetchData() {
        fetch(API_URL)
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") {
                    // Update Antrian
                    document.getElementById('num-a').textContent = data.antrian.A;
                    document.getElementById('num-b').textContent = data.antrian.B;
                    document.getElementById('num-c').textContent = data.antrian.C;

                    // Notifikasi Suara
                    if(lastAntrian.A !== data.antrian.A && data.antrian.A !== "000") playVoice(data.antrian.A, data.antrian_loket.A);
                    lastAntrian = data.antrian;

                    // Update Tampilan Data Kinerja (Menampilkan data ke elemen right-panel)
                    let html = `<h3>Ringkasan Kinerja</h3><pre>${JSON.stringify(data.global, null, 2)}</pre>`;
                    document.getElementById('data-display').innerHTML = html;
                }
            })
            .catch(err => console.error("Gagal ambil data:", err));
    }

    function playVoice(nomor, loket) {
        let text = `Nomor antrean ${nomor.split("").join(" ")} silahkan menuju ke ${loket}`;
        let msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'id-ID';
        window.speechSynthesis.speak(msg);
    }

    // Interval Sinkronisasi
    setInterval(fetchData, 25000);
    fetchData();
    setInterval(() => { document.getElementById('clock').textContent = new Date().toLocaleTimeString(); }, 1000);

    // Load YouTube
    let tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
    document.body.appendChild(tag);
    function onYouTubeIframeAPIReady() {
        new YT.Player('yt-player', { videoId: 'jrXNVlQJpW0', playerVars: { 'autoplay': 1, 'mute': 1 } });
    }
</script>
</body>
</html>
